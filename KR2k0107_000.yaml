body:
  text: 桂林風土記目録地理類八雜記之屬古今事跡桂林舜祠雙女塚伏波廟東觀越亭巖光亭訾家洲灕山堯山廟東山亭碧潯亭去思館附拜表亭夾城獨秀山歐陽都䕶塚海陽山㑹仙里隠仙亭靈渠甘巖張天師道陵宅嚴州牂牁水如錦潭象州仙人山遷鸎坊進賢坊附菩提寺道林和尚開元寺震井延齡寺聖像宜州龍開江事蒼梧火山宜州龍採木徐氏還魂石氏射樟木燈檠祟米蘭美績李給事長歌顔特進名延之李光禄名襲志李衛公名靖禇中令名遂良張中令名九齡桂州陳都督袁恕巳張鷟臣等謹案桂林風土記一巻唐莫休符撰桂林自秦時置郡厯漢至唐昭宗光化二年休符以檢校散騎常侍守融州刺史撰為此記新唐書藝文志作三巻今存者一巻巻中目録四十四條今缺火山採木二條盖非完書矣朱彛尊曝書亭集有此書䟦云閩謝在杭小草齋所録舊藏徐惟起家䟦稱獲自錢塘沈氏是洪武十五年抄此本原有在杭手識及洪武年月與彛尊所言合盖即所見本也彛尊又言中載張固盧順之張叢元晦路貫韋瓘歐陽臏李渤諸人詩向未著於録亟當發其幽光云云今觀諸詩外尚有楊尚書陸宏休二首亦唐代軼篇為他書之所未載今全唐詩採録諸篇即據此本則其可資考證者又不止於譜民風記土産矣乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀桂林風土記原序前賢撰述有事必書故有三國志荆楚嵗時記湘中記奉天記唯桂林事迹闕然無聞休符因退居粗録見聞曰桂林風土記聊以為叙時唐光化二年九月二十三日序
