body:
  text: 桂林風土記唐莫休符撰古今事跡桂林按地里志桂州禹貢荆州之域春秋時越七國時服於楚秦始皇三十三年發逋亡贅壻古者未有年號至漢武帝方紀年名故云始皇三十三年賈人掠取陸梁之地為桂林吳時文士薛綜言昔帝舜南廵蒼梧秦置桂林南海象郡南越志漢武改為鬱林郡以桂林為縣吳書孫皓鳳凰三年分鬱林象郡為桂林又按圖經云吳甘露年分鬱林象郡為桂林今以魏書證之甘露乃髙貴鄉公曹髦所紀年號非吳書也古有名人張衡詩云我所思兮在桂林欲往從之湘水深是則桂林為郡久矣漢祖命周電擊南越南越王趙佗據險為城電不能踰今靈川全義嶺有越城漢紀有周電為泗水侯是吕后時非髙祖也地里志云周電未知其實舜祠舜祠在虞山之下有澄潭號皇潭古老相承言舜南廵曽游此潭今每遇嵗旱張旗震鼓請雨多應中有大魚遇洪水泛下至府東門河際有停客巨舫往往載起然終不為人之害舊傳舜葬蒼梧丘在道州江華縣九疑山也雙女塚在府城北十里俗傳舜妃尋帝卒而葬於此塚髙十餘丈周廻二里餘伏波廟伏波廟在郭中之東北二里是東漢伏波将軍馬援之祠也東觀觀在府郭三里隔長河其東南皆崇山巨壑緑竹青松崆峒幽竒登臨險易不可名狀有石門似公府之狀而隘秉燭行五十歩有洞穴坦平如毬場可容千百人如此者八九所約略相似皆有清泉渌水乳液葩漿怪石嵌空龍盤虎踞引燭縁渉竟日而還終莫能際相傳云昔有人好泉石多束花果裹糧深渉而行還計其所行已及東河之下如聞棹檝湍湍之聲在其上又有山外髙峯舊有亭臺近巳摧壊前政張侍郎名固大中年重陽節宴於此從事盧順之贈固詩曰渡江旌斾動魚龍令節開筵上碧峯翡翠巢低巖桂小茱萸房濕露香濃白雲郊外無塵事黄菊筵中盡醉容好是謝公髙興處夕陽歸騎出疎松張侍郎和詩曰亂山青翠郡城東爽節馮髙一望通交友會時絲管合羽觴飛處笑言同金英耀彩晴雲外玉樹凝霜暮雨中髙詠巳勞潘岳思醉歡慚道自車公咸通年前政張大夫叢遊東觀詩曰巖岫碧孱顔靈蹤若可攀樓臺煙靄外松竹翠㣲間玉液寒深洞秋光秀逺山憑君指歸路何處是人寰越亭在府城北與聖壽寺接連有巖洞亭臺髙對碧峯山穴透出北面因名北牖洞逺眺長江極目煙水北人至此多軫鄉思會昌初前使元常侍名晦搜達金貂翺翔翰林敭厯臺省性好巖沼時恣盤游建大八角亭寫其真院砌臺釣榭石室蓮池流杯亭花藥院時為絶景于時潞冦初平四郊無壘公私宴聚較勝事先美節良辰尋芳選勝管絃車馬闐溢路隅金貂從此府除浙東留題曰紫泥逺自金鑾降朱斾飜馳鏡水頭陶令風光偏畏夜子牟衰髩暗驚秋西隣月色何時見南國春光豈再游莫遣艶歌催客醉不堪回首翠娥愁副使路貫與金貂同年及第和詩一首謝安致理逾三載黄覇清聲徹九重猶輟珮環歸鳳闕且将仁政到稽峯林間立馬羅千騎池上開筵醉一鍾共喜甘棠有新詠獨慚霜鬢又攀龍越亭初成金貂有六十韻長詩曰乏才叨八使徇禄非三顧北闕頒詔條東隣證迷誤未聞述職效已見脫煩趣灝氣爽衣巾嵐颸輕杖屨其餘不省記巖光亭在北羅門外臺亭巖洞亞於越亭亦是元常侍新置有石碁局爛柯石嶂金貂有五十韻詩云石静如開鏡山髙若聳蓮筍竿抽玉管花蔓綴金鈿餘不省記訾家洲在子城東南百餘歩長河中先是訾家所居因以名焉洲每經大水不曽淹浸相承言其浮也元和中裴大夫名行立四子歸之歸闕歸聞歸禮庶因獲朝奨也剏造亭宇種植花朩迄今繁盛東風融和衆卉争妍有大儒柳宗元員外撰碑千餘言猶在前汴州楊尚書宴游題詩云桂林雲物盡漫漫雨裏花開雨裏殘唯有今朝好風景櫻桃含笑柳眉攢前政從事陸宏休詩云新春蘂綻訾家洲信是南方最勝游酒滿百分殊不怕人添一歲更堪愁鸎聲暗逐歌聲艶花態還隨舞態羞莫惜今朝同酩酊任他龜鶴與蜉蝣灕山在訾家洲西一名沈水山以其山在水中遂名之古老相傳龍朔中曽降天使投龍於此今每歲旱請雨潭中多有應前政元常侍以其名與昭應驪山音同故遂改為儀山近歲於此置温靈廟廟中時産青蛇號為龍駒翠色或縁人頭頂手中終無患害堯山廟在府之東北隔大江與舜祠相望遂名堯山山有廟極靈四時公私饗奠不絶北接湖山連亘千餘里天将降雨則雲霧四起逡廵風雨立至每歲農耕候雨輙以堯山雲卜期東山亭府之東門有大亭枕江與望月樓接連近子城建竪多年不記歲月碧潯亭去思館附亭館大中初前韋舎人瓘剏造在子城東北隅十餘歩接近逍遥樓俯近大江館宇宏麗制作精緻髙下敞豁冠諸亭院去思館舊名青桂館前政吏部張侍郎鷟除替飾裝於此遂改為去思館韋舎人年十九入闕應進士舉二十一進士狀頭牓下除左拾遺于時名重縉紳指期直上馬相為長安令二十八度候謁不䝉一見後任亷察桂林纔半歲而馬相執大政尋追懐舊事非時除賔客分司悵望留詩於碧潯亭曰半年領郡固無勞一日為心素所操輪奐未成繩墨在規模巳壯閌閎髙理人雖切才常短薄宦都縁命不遭從此歸耕洛川上大千江路任風濤拜表亭北接碧潯南連望月東界長河西隣雉堞前政山北盧尚書匡添建置夾城從子城西北角二百歩北上抵伏波山縁江南下抵子城逍遥樓週廻六七里光啓年中前政陳太保可環剏造三分之二于是諸營展力日役萬人不時而就増崇氣色殿若長城南北行旅莫不歎美獨秀山在郭中居子城正北百餘歩髙聳直上周回一里餘逈出郭中下有巖洞舊有宋朝名儒顔延之宅讀書亭後為從事所居往往見靈精居者少寧前政張侍郎廢毀焉歐陽都䕶塚府北郭松逕盡處有國初安南都䕶名普讚塚墓普讚靈川人其宅今為聖壽寺有廟在寺之北下歿後殯於北郭時有識地勢者言葬所有天子氣由是官掘斷至夜又有隂兵填平如舊既而再掘復平不已時有効役者人偶宿其所夜聞鬼兵相語曰能以青布運土投江則我等無能為也及明主吏聞宿者言遂用青布輦運土投河竟免隂兵填築今墳所掘處猶存有石人石柱皆在松楸百餘株近為樵者斫伐無餘子孫自千數年湮沒無聞或云訾家洲因運此土流下成洲有歐陽臏者題絶句曰舊業分明桂水頭人間業盡水空流春風日暮江頭立不及漁翁有釣舟海陽山在全義縣北及灕湘二水源也流至全義北三百歩分流北去作為湘南下為灕山下有廟前政陳太保奏録詔封廣潤侯會仙里南去府五十里舊有羣仙於此輜軿羽駕遍于碧空竟日而去里人聚觀狀聞因名㑹仙里隐仙亭本名盤龍岡在府西郭三里與延齡寺相近寳歴年前使李給事名渤開置亭臺種植花朩有池沼巨巖水深無際有嘉蓮洞白雀峒石盆大亭有慶雲亭在山頂有朝陽亭夕陽亭連理橘秉燭廵游時見龍跡大如椀水有靈魚龍腹四足人或誤捕風雨立至山河秀異皆入畫圖作屏障為信好之珍有從事皇甫湜吳武陵撰碑碣三所給事徵起山中一表薦九賢皆居顯貫給事為考功郎宰相皆書下考以天子廵游蹂禾稼無所獻替故也除桂林有歎鴈詩曰三朝四黜倦遐征往復皆愁萬里程爾解分飛却北去我方從此向南行又題隐仙詩二首常歎源泉去不回我今自去更難來欲知一一留心處手種巖花次第開隨雲不厭蒼梧逺似鴈逢春又北飛惟有隐仙溪上月他時相望兩依依靈渠在全義縣灕湘二水分流處相傳曰後漢伏波将軍馬援開川濬濟水急曲行回互用遏其衝節節斗門以駐其勢有伏波廟在縣側又按後漢鄭𢎞奏交趾七郡貢錢從東泛海多沒溺請開桂嶺靈渠後御史史禄重開闢又按前漢武帝元鼎五年命伏波将軍路博徳樓船将軍楊僕戈船将軍嚴助擊南越吕嘉戈船出零陵下灕水此則前漢嶺首巳通舟檝明矣焉得至後漢馬援鄭𢎞始開靈渠於理未盡言馬鄭重修則可云創闢於義有乖休符駁甘巖在府南八十里大江傍其源出靈川縣界思磨山自水下湧出巖方十餘丈大如屋室莫究其深淺盛暑到彼凛冽增寒張天師道陵宅天師舊宅在賀州道籙以為𤣥中大法師今以宅為廟廟中有美異果實有人食之無患唯不可採取必致禍也嚴州牂牁水在嚴州州門長河其源從牂牁流下八十餘丈本州圖經所載如錦潭縻郡述昆州有如錦潭水深無際近歲有人伐潭邊巨朩樹倒入潭中逡廵沈沒莫知所在潭中時聞音樂如大府廣筵移時而止象州仙人山象州武仙縣多有神仙聚集聚髙山羽駕時見如建州武夷山皆有仙人換骨函櫬之跡遷鸎坊進賢坊附遷鸎坊本名阜財在市西門因曹鄴中丞進士及第前政令狐大夫改為遷鸎坊進賢坊本名長街在府西門因趙觀文狀頭及第前陳太保改坊名菩提寺道林和尚往年中桂州人薛公元常供養一僧法號道林如是精心供養十有餘年忽一日其僧辭去云貧道歸去撓瀆多年更無可酬今只有舊轉經一函且寄宅中如至過歲不回即可開轉讀如此經一歲開鎻有金滿函可數千兩後賣一半買地造菩提寺并建道林真身供養今儀像見存薛今見有孫禹賔在桂林効職開元寺震井隋曰縁化寺後因紗燈延火燒燬重建𤣥宗朝改名開元寺有前使禇公親筆冩金剛經碑在舎利塔前西有觀音寺井貞元中有李氏因左遷寓居僧院屬暑月以食餘熟羊脾懸井中逡廵雷震暴作羊肉置於隙地而烟氣薫灼犬不食蟻不附至今僧俗中言井有龍致之愚以理裁有異於此夫龍嗜血食肉重牢醴人有享祭必選良肉醇酒潔饌珍羞敬事精禮寧有一羊脾而迅雷震盖以伽藍井水奉獻諸佛衆僧而遽以肉味羶汚神祗之所是以不容乃致雷擊去理必然矣其井終亦坍壊先令狐相從事當府因撰震井記然以羊㣲事曽未移時天鍳巳知則人之善惡或愈於此又豈纎遺於隂報乎昔董卓縱暴為吕布殺而焚屍揚灰後有故吏收其灰以小棺殯於郡城又遭風雨漂流失其所在楊國忠以貴妃因椒房承寵綰三十二使印綬天寳十二載二月拜司空冊命之日天雨土霑朝服未幾族滅於馬嵬闗西楊氏逺四知去三惑歴千載而慶延子孫則禍福無門唯所召矣故孔明有言勿以惡小而故為勿以善小而不為茍能佩服斯言以神祇為證則終身不居有過之地延齡寺聖像寺在府之西郭郊三里附近隐山舊號西慶林寺武宗廢毀宣宗再崇峯巒牙張雲朩交映為一府勝游之所寺有古像徴於碑碣盖盧舎那佛之所報身也此地元本荆榛先無寺宇因大水漂流巨材至時有工人操斧斤斫伐将欲下斫忽見一梵僧立在朩傍謂曰此朩有靈爾宜勿伐既而罷去又有洗蔬者於其上則浮濯葷辛於其上又沉雅契梵僧之言由是咸知有靈遂刻削為僧佛當則天后臨朝之日夢金人長一丈六尺乞袈裟及詔大臣問其事皆莫能解旋奏陛下既有此夢乞依夢中造袈裟懸於國門以俟符驗明早大臣奏懸袈裟忘收已失遂詔天下求之巳在桂州盧舎那佛身至今尊卑歸敬遐邇欽崇時旱請雨皆有響應如意宜州龍開江事此下闕蒼梧火山宜州龍採朩二條桂之縻郡有宜州其河如桂州楊江水岸深斗形勢異於衆水古老流側近岡上俄頃夫還妻以告之夫疑是惡人尋至岡所求不見但見百牛既夜乃還家至明遂遇水漲流水蔽江合蒼梧耆老盡知之徐氏還魂昔西漢武帝有神通之異南朝有干寳述幽府㝠祕之言泉蘇韶崔亦紀靈怪牛丞相著三巻妖録及徐氏還魂皆鄙夫隣居在咸通末莫非目驗方證不誣陽朔居人蘇太元妻産三子徐巳疾終既殯忽一日還家但聞語而不見形云某年命未終冥司不録今且暫歸憐撫其子補綻其衣一切如在稍經旬月隣伍旋知占卜吉凶述善惡一一符驗有鄉人在府充職染疾其眷屬請卜之俄頃云去至凉風館南地名柘木林遇虎當道不敢過遂却回卜者情廹堅請再往俄頃曰至府見疾者巳瘥疑其不實遂問其所居曲折疾人形貌徐氏不曽至府又未識病者一一言之無差異方明其實又有人求卜了謝曰無物奉酬深為不足徐氏曰汝家有三斗粟子在西房何得稱為無卜者請取之逡廵負粟子至其前衆皆愕然卜者尤所慚耻如此不一難備書述一日言舜帝差人討蠻有人求至近驛助備熟食更一兩日當還如期而歸将得㝠司一分細飰致夫前曰此飯曷若人間造者夫視之品饌則倍珍於他食又一旦泣告曰無端洩隂間事獲罪䝉追此去難再還好看兒女又泣别遂絶音響太元尚在石氏射樟木燈檠祟開成中桂林禆将石從武居在子城西壕側從武早習弓矢忽一年家内染患疾長㓜罕有安者每至深夜常見一人從室出來體有光燄居常令疾者痛苦稍間若此物至則呻吟聲加甚毉巫醮謝皆莫能效從武心疑精邪為祟至夜操弓挾箭隠户潛形候其來俄聞精復至稍近遂彀弓引滿一發中焉見彼焰光星散而滅遂命燭而看視之乃是家中舊使樟朩燈檠中箭而倒乃擘為韲粉焚爇為灰送長河於是家人患者皆愈大中年前政張侍郎名文規三代台相之家嘉貞𢎞靖延賞亷察桂林從武時職司通引偶聞此事曽召問具以實對乃為石氏射燈檠𫝊從武子朂在職近方去世淯諧嗣亦效卑職得金貂傳聞米蘭美績長慶中前政李給事名渤字濬之自給事中除桂林奏請名儒吳武陵為倅故事副使上任具櫜鞬通詩文數日於毬場致宴酒酣吳乃致詞云奉約同游山水柰何以紅帛繫予首仍命婦女於看棚聚觀相耻既彼我酡顔各争意氣吳為臺盤坐褰衣躶露以溺給事怒命衙士拉送衙司梟首時都押衙米蘭知其不可遂引而寢多遣人䕶衛給事扶歸寢堂夜半而覺聞家衆聚哭甚悲驚而問焉乃曰昨聞設亭喧噪又聞命衙司斬副使不知其由憂及禍是以悲泣給事大驚亟命逓問之米蘭具啓昨雖奉嚴㫖未敢承命副使猶寢在衙院無苦給事達明早至衙院卑詞引過上下俱自克責益相敬奉時未有監軍於是乃奏米蘭牧于象郡以酬勅下允從遂又以使衙儀衛送上本任李給事長歌李給事名渤為太學博士長歌喜弟淑再至歌曰前年别時秋九月白露吹霜金吹烈離鴻一别影初分涙袖雙揮心哽咽别來幾度得音書南岳知此下闕廬山峨峨倚天碧捧排空崖千萬尺社牓長題髙士名食堂每記雲山跡我本開雲此山住偶為名利相縈誤自負心機四十年羞聞社客山中篇憂時魂夢憶歸路覺來疑在林中眼昨日亭前烏鵲喜果得今朝爾來此吾吟行路五十篇盡說江南數千里自憐兄弟今五人其營儒素家尚貧雖然禀氣各不一就中總免拘常倫長兄年少曽落拓㧞劍沙場隨衛霍口裏雖譚周孔文懐中不舎孫吳略次兄一生能苦節夏聚流螢冬暎雪非論疾惡志如霜更覺臨泉心似鐵第三之兄更竒異昻昻獨負青雲志下看金玉不如泥肯道王侯身可貴却愁清逸不干時髙蹤大器無人知倘逢感激許然諾必能萬古留清規念爾年來方二十夙夜孜孜能獨立巻中筆落星漢摇洞裏丹靈鬼神泣嗟余流浪心最狂十年學劍逢時康心中不解事拘束世間談笑多相妨廣海青山殊未足逢著髙樓還醉宿朝走安公櫪上駒暮偷陶令籬邊菊近來詩思殊無况苦被時流不相放雲騰浪走勢未衰鶴膝蜂腰豈能障送爾為文殊不識貴從一一傳胷臆若到湖南見紫霄㑹湏待我同攀陟顔特進名延之宋顔延之字延年琅琊臨沂人曽祖含父顯延之少孤貧居附南郭空巷甚陋好讀書無不覽文章之美冠絶當時好飲酒不拘細行年三十尚未婚起家豫章公世子叅軍累官祕書監宋太祖文皇帝諱義隆宋氏第三主昵愛僧惠琳常獨占一榻延之因醉白曰昔劉盆子尚同叅軍乗輿袁絲正色曰此三公之座豈可以刑餘之人居延之性方直言無所廻避居身清約不求財利布衣蔬食獨酌郊野與謝靈運以詞彩齊名而遲速相懸嘗勅俱入擬樂府上篇延之立成而靈運久而方就帝問其優劣於鮑昭昭曰謝五言如芙蓉初發自然可愛顔詩鋪錦列繡彫繢滿眼尋為始安郡經過潯陽日造淵明飲焉每遇一佳景必酣醉而還臨去留錢二百萬與淵明悉送酒家及淵明卒延之為之誄以孝建三年卒年七十三贈特進自潘岳陸機之作文士莫及顔謝焉李光禄名襲志李襲志金州安康人也仕隋歴始安郡丞大業末江外盗賊尤多襲志散家財召得三千人以守郡城髙祖受隋禪降璽書勞問編入屬籍授桂州總管前後任桂州凡三十八載政尚清簡嶺外安之後上表請入朝拜右光禄行汾州刺史致仕卒於家李衞公名靖李靖字藥師雍州三原人也姿貌瓌偉有文武才略武徳二年同趙郡王孝㳟至江陵破蕭銑四十萬擒銑赴京承制度嶺至桂州分路招撫大首領馮盎李光庭等懐輯九十六州六十萬户詔充嶺南道安撫大使檢校桂州大總管武徳六年征輔公祏於江淮平之又領兵出塞屢顯大功拜右僕射平章事封衛國公薨年七十九桂州子城自衛國公所製號曰始安郡禇中令名遂良令公散騎常侍亮之子仕太宗啓沃聖心恢宏帝業歴官中書令髙宗将廢王皇后立武昭儀為后令公受先皇寄托之重極諫以為不可由是忤㫖貶潭州顯慶二年又貶桂州時李義府許敬宗傾巧曲佞附託皇后重貶令公愛州明年卒於貶所年六十二死後二年又追削官爵子孫並流愛州髙宗崩遺詔復爵張中令名九齡一名博物韶州曲江人也以文學進士及髙第與趙冬曦齊名俄應制以明皇嗣位久未南郊上表抗論由是名價益重與燕國公張說同姓以詞學親洽時括田使宇文融干預朝政說惡之融所奏論多見抑挫不行融與臺丞連表訟說帝令說藉草辨對髙力士宻奏以說有大功於國不宜挫辱乃落下平章事致仕九齡連坐貶趙州又以家鄉不便乞換回近嶺南一處遂出江西俄轉桂州都督兼嶺南按察使薨年六十八桂州陳都督國朝吕才博士博渉羣書該通衆藝為太宗皇帝所知著隂陽吉㓙地理要訣五十餘巻行於世今之婚嫁占刻多用其言又别著駁隂陽數千言以為行年塚宅五音皆不可信愚以為吕氏多才多學博古辨今不欲世人曉達隂陽輙恃年命罔拘慎博前知遂立斯言以節逾僭若考前史焉得稱無昔寗氏起宅相者云必出賢甥魏舒由是甚顯遇羊祜少時有占地者言墓合出天子祜惡而掘之占者云猶出折臂三公祜因墜馬折臂竟位三公陶侃㣲時種瓜有老人求瓜侃厚惠之其人感此因指眠牛岡可貴侃用葬母位至太尉吳主孫氏家世富春葬於城東岡塚上常結五色慶雲齊主蕭道成先塋在武進縣其上結慶雲宋明帝命獵人以五尺鐵釘之入柱忽作龍吟驚震山谷皆福昆嗣略據所聞以為證議陳思應本名聿修富州龍平人也少居鄉里以博學為志開元中忽有異人求寄宿聿修觀其容止稍異乃盡禮延之明日將告去謂聿脩曰某久攻地理頗有十全一宿淹留厚沐情禮思有所報遥見此洲上五里地形當富貴不可言用為殯岡必福昆嗣聿修忻然相感遂同詣其處視之客曰若葬此處可世世出郡守又指一處曰若用此處可世世為都督聿修敬謝分袂而去居數載䘮母親遂以所指都督處為塋他日拜墳忽見其地産金筍甚衆黙追宿客之言又覩金筍斯驗益以自負遂採而歸既再至金筍又産三載服闋所獲多矣因携入京以求遇素鮮知巳茫然暗投見晦朔及弔慶公侯相府侍兒通傳有憇于民舎者聿修厚許其直求稅一榻為之逆旅俄而節朔貴門侍者復至聿修悉以金筍衒其目果異而問焉頗亦敬奉粗䝉善遇因以金筍為賂居數日又遣人覆檢聿修得以所業文詞經斷綴之金筍獻遺未幾朝貴咸聞或有引達者又以文業干進凡諸要地盡知其名稍得岐路進取益切于時有同姓名思應者亦以昭穆情昵乃以前任告牒相遺因易名干執政遂特除桂州都督今府署大㕔㕔壁記具列名氏亦有子孫職于本郡故鄙諺有云良宅吉冢縁者遇之信然矣袁恕巳恕巳滄州東光人也長安中為刑部少卿與張柬之崔𤣥暐敬暉桓彦範等五王建議時則天不豫張易之與弟昌宗入内侍疾将圖不軌恕巳等與左羽林将軍李多祚率兵五百人就宫中斬易之昌宗梟首天津橋廢則天迎中宗即位重興大唐社稷功格天地武三思用張垍計潛與中宗韋后私通帝雅信后言計無不成行竟流貶五王於嶺南尋發偽制使周利正盡殺之恕已流環州利正逼令服野葛汁不死以手爬地取土而食爪甲皆盡至骨乃擊殺之睿宗誅韋后方雪其寃恕已孫髙貞元中歴給事中謇諤雅傳家法憲宗制追贈左丞髙父建官至太府卿張鷟張鷟字文成深州深澤人也後趙右侯賔之後少聰敏過人其祖齊王文學以當時儒士多稱鷟之才莫不歎異因曰我孫為人所知如天以鸑鷟為鳳凰之佐五色成文因名鷟字文成弱冠應舉下筆成章中書侍郎薛元超特授襄樂尉遷監察御史司門貟外至開元中姚崇為相誣其奉使江南受遺賜死其子上表請代父死黄門侍郎張廷珪刑部尚書李日知連表稱寃遂減死流嶺南數年起為龔州長史卒年七十三文成凡七舉四叅選皆中甲科正諫大夫貟半千謂人曰張子之文如青銅錢萬揀萬中時號青銅錢學士久視中太官令馬仙童陷突厥中黙啜問曰文成何在此人何不足用又新羅日本國前後遣使入貢多求文成文集歸本國其為聲名逺播如此著雕龍䇿帝王龜鏡朝野僉載二百巻文成以五為縣尉因著才命論以適志盛行於世有李季孫者注才命論言是燕公詞盖不覽唐史率意紀文大惑時人一向紕繆休符駁議桂林風土記
